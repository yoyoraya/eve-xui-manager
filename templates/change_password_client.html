<!DOCTYPE html>
<html lang="fa" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تغییر رمز عبور - Eve Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='fonts/fonts.css') }}">
    <script nonce="{{ csp_nonce }}">
        (function () {
            try {
                const saved = localStorage.getItem('eve_theme');
                document.documentElement.dataset.theme =
                    (saved === 'light' || saved === 'dark') ? saved : 'dark';
            } catch (e) {}
        })();
    </script>
    <style nonce="{{ csp_nonce }}">
        :root {
            --bg: #020617; --bg-card: #0f172a; --bg-input: #0a1628;
            --border: #1e293b; --text: #f8fafc; --muted: #64748b;
            --danger: #ef4444; --warn-bg: rgba(239,68,68,.08);
            --cta: #22c55e; --cta-dark: #16a34a; --cta-shadow: rgba(34,197,94,.35);
        }
        html[data-theme="light"] {
            --bg: #f1f5f9; --bg-card: #fff; --bg-input: #f8fafc;
            --border: #e2e8f0; --text: #0f172a; --muted: #64748b;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Vazirmatn','Inter',-apple-system,sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex;
            align-items: center; justify-content: center; padding: 20px;
        }
        .card {
            width: 100%; max-width: 440px;
            background: var(--bg-card); border-radius: 24px;
            padding: 40px 36px;
            box-shadow: 0 32px 64px -12px rgba(0,0,0,.6);
            border: 1px solid var(--border);
        }
        .header { text-align: center; margin-bottom: 28px; }
        .icon-wrap {
            width: 60px; height: 60px; margin: 0 auto 16px;
            background: rgba(34,197,94,.12);
            border: 1.5px solid rgba(34,197,94,.3);
            border-radius: 16px; display: flex;
            align-items: center; justify-content: center;
        }
        .icon-wrap svg { width: 28px; height: 28px; color: var(--cta); }
        .header h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
        .header p { color: var(--muted); font-size: .875rem; line-height: 1.5; }
        .mobile-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.25);
            border-radius: 20px; padding: 4px 12px; margin-top: 8px;
            font-size: .8rem; color: #86efac; direction: ltr;
        }
        .alert {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 12px 14px; border-radius: 10px; margin-bottom: 20px;
            font-size: .875rem; line-height: 1.5;
            background: var(--warn-bg); border: 1px solid rgba(239,68,68,.3); color: var(--danger);
        }
        .alert svg { width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px; }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block; font-size: .8rem; font-weight: 600;
            color: var(--muted); margin-bottom: 7px;
        }
        .input-wrap { position: relative; }
        .input-wrap .icon {
            position: absolute; top: 50%; transform: translateY(-50%);
            left: 14px; width: 18px; height: 18px; color: var(--muted);
            pointer-events: none;
        }
        .toggle-pw {
            position: absolute; top: 50%; transform: translateY(-50%);
            right: 14px; background: none; border: none;
            cursor: pointer; color: var(--muted); padding: 0;
            width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
        }
        .toggle-pw:hover { color: var(--text); }
        .toggle-pw:focus-visible { outline: 2px solid var(--cta); outline-offset: 2px; border-radius: 4px; }
        input[type=password], input[type=text] {
            width: 100%; padding: 13px 40px 13px 40px;
            background: var(--bg-input); border: 1.5px solid var(--border);
            border-radius: 11px; color: var(--text); font-size: .975rem;
            font-family: inherit; direction: ltr;
            transition: border-color .18s, box-shadow .18s;
        }
        input:focus {
            outline: none; border-color: var(--cta);
            box-shadow: 0 0 0 3px rgba(34,197,94,.15);
        }
        input::placeholder { color: var(--muted); }
        /* strength bar */
        .strength-bar { height: 4px; border-radius: 2px; background: var(--border); margin-top: 8px; overflow: hidden; }
        .strength-fill { height: 100%; border-radius: 2px; width: 0; transition: width .3s, background .3s; }
        .strength-label { font-size: .75rem; color: var(--muted); margin-top: 4px; min-height: 1em; }
        .btn {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            background: var(--cta); color: #fff;
            font-size: 1rem; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 9px;
            transition: all .2s; font-family: inherit; margin-top: 6px;
        }
        .btn:hover:not(:disabled) {
            background: var(--cta-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 24px var(--cta-shadow);
        }
        .btn:disabled { opacity: .65; cursor: not-allowed; transform: none !important; }
        .btn:active:not(:disabled) { transform: translateY(0) !important; }
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
            border-radius: 50%; animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .rules { margin: 16px 0 0; padding: 12px 14px; border-radius: 10px;
            background: rgba(34,197,94,.05); border: 1px solid rgba(34,197,94,.15);
            font-size: .8rem; line-height: 1.8; color: var(--muted); }
        .rules li { list-style: none; padding-right: 0; }
        .rules li::before { content: '‎• '; color: var(--cta); }
        @media (max-width: 480px) { .card { padding: 28px 20px; } }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="icon-wrap" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
            <h1>تغییر رمز عبور</h1>
            <p>برای امنیت حساب شما، رمز عبور باید تغییر کند.</p>
            <div class="mobile-badge" aria-label="شماره موبایل شما">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     style="width:14px;height:14px" aria-hidden="true">
                    <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
                    <line x1="12" y1="18" x2="12.01" y2="18"/>
                </svg>
                {{ mobile }}
            </div>
        </div>

        {% if error %}
        <div class="alert" role="alert">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" id="change-form" novalidate>
            <div class="form-group">
                <label for="new_password">رمز عبور جدید</label>
                <div class="input-wrap">
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                         aria-hidden="true">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <button type="button" class="toggle-pw"
                            onclick="togglePw('new_password', this)"
                            aria-label="نمایش/پنهان کردن رمز عبور">
                        <svg id="eye-new-show" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                             style="width:18px;height:18px">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg id="eye-new-hide" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                             style="width:18px;height:18px;display:none">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                    <input type="password" id="new_password" name="new_password"
                           placeholder="حداقل ۸ کاراکتر"
                           required autofocus
                           autocomplete="new-password"
                           oninput="checkStrength(this.value)">
                </div>
                <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
                <div class="strength-label" id="strength-label" aria-live="polite"></div>
            </div>

            <div class="form-group">
                <label for="confirm_password">تکرار رمز عبور جدید</label>
                <div class="input-wrap">
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                         aria-hidden="true">
                        <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <input type="password" id="confirm_password" name="confirm_password"
                           placeholder="تکرار رمز عبور"
                           required
                           autocomplete="new-password">
                </div>
            </div>

            <button type="submit" class="btn" id="submit-btn">
                <span>تأیید و ورود</span>
            </button>
        </form>

        <ul class="rules" aria-label="قوانین رمز عبور">
            <li>حداقل ۸ کاراکتر</li>
            <li>ترکیب حروف و اعداد توصیه می‌شود</li>
            <li>نمی‌تواند همان شماره موبایل باشد</li>
        </ul>
    </div>

    <script nonce="{{ csp_nonce }}">
        function togglePw(inputId, btn) {
            const input = document.getElementById(inputId);
            const showEl = document.getElementById('eye-new-show');
            const hideEl = document.getElementById('eye-new-hide');
            if (input.type === 'password') {
                input.type = 'text';
                showEl.style.display = 'none'; hideEl.style.display = '';
            } else {
                input.type = 'password';
                showEl.style.display = ''; hideEl.style.display = 'none';
            }
        }

        function checkStrength(pw) {
            const fill = document.getElementById('strength-fill');
            const label = document.getElementById('strength-label');
            let score = 0;
            if (pw.length >= 8) score++;
            if (pw.length >= 12) score++;
            if (/[A-Z]/.test(pw)) score++;
            if (/[0-9]/.test(pw)) score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;
            const pct = Math.min(100, (score / 5) * 100);
            fill.style.width = pct + '%';
            if (score <= 1) { fill.style.background = '#ef4444'; label.textContent = 'خیلی ضعیف'; }
            else if (score === 2) { fill.style.background = '#f97316'; label.textContent = 'ضعیف'; }
            else if (score === 3) { fill.style.background = '#eab308'; label.textContent = 'متوسط'; }
            else if (score === 4) { fill.style.background = '#22c55e'; label.textContent = 'قوی'; }
            else { fill.style.background = '#22c55e'; label.textContent = 'خیلی قوی'; }
        }

        document.getElementById('change-form').addEventListener('submit', function (e) {
            const pw = document.getElementById('new_password').value;
            const cpw = document.getElementById('confirm_password').value;
            if (pw.length < 8) {
                e.preventDefault();
                document.getElementById('new_password').focus();
                return;
            }
            if (pw !== cpw) {
                e.preventDefault();
                document.getElementById('confirm_password').style.borderColor = 'var(--danger)';
                document.getElementById('confirm_password').focus();
                return;
            }
            document.getElementById('confirm_password').style.borderColor = '';
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div><span>در حال ذخیره…</span>';
        });
    </script>
</body>
</html>
