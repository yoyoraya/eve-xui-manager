name: Build Offline Bundle

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      targets:
        description: "Ubuntu targets (e.g. jammy  or  focal jammy noble)"
        default: "jammy"
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git log in release notes

      - name: Build offline bundle
        env:
          EVE_OFFLINE_TARGETS: ${{ github.event.inputs.targets || 'jammy' }}
        run: bash prepare-offline-bundle.sh .

      - name: Build standalone Redis add-on (jammy amd64)
        run: |
          set -e
          mkdir -p redis-addon/apt/partial redis-addon/wheels dist
          sudo apt-get update
          # Download redis-server + all its dependencies (offline-installable)
          sudo apt-get install -y --download-only --no-install-recommends \
            -o Dir::Cache::archives="$PWD/redis-addon/apt" redis-server
          rm -rf redis-addon/apt/partial redis-addon/apt/lock
          # Python redis wheel (matches the runner's CPython 3.x; pure-python so portable)
          python3 -m pip download --only-binary=:all: --dest redis-addon/wheels redis
          cp install-redis-offline.sh redis-addon/
          chmod +x redis-addon/install-redis-offline.sh
          tar -czf dist/redis-offline-jammy.tar.gz -C redis-addon .
          echo "Redis add-on contents:"; ls -R redis-addon | head -40
          du -sh dist/redis-offline-jammy.tar.gz

      - name: Bundle info
        id: info
        run: |
          SIZE=$(du -sh dist/eve-xui-manager-offline.tar.gz | awk '{print $1}')
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "Bundle size: $SIZE"

          # Extract version from app.py
          VER=$(grep -m1 'APP_VERSION' app.py | grep -oP '"[^"]+"' | tr -d '"' || echo "${{ github.ref_name }}")
          echo "version=$VER" >> "$GITHUB_OUTPUT"

          # Get previous tag for changelog range
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "${{ github.ref_name }}" | head -1 || echo "")
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

          # Build changelog from commit messages since previous tag
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "${PREV_TAG}..${{ github.ref_name }}" --pretty=format:"- %s" | grep -v "^- Bump version" || echo "- See commit history")
          else
            CHANGELOG=$(git log --pretty=format:"- %s" -10 | grep -v "^- Bump version" || echo "- See commit history")
          fi
          # Save multi-line to output
          {
            echo 'changelog<<EOF'
            echo "$CHANGELOG"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upload artifact (all runs)
        uses: actions/upload-artifact@v4
        with:
          name: eve-xui-manager-offline-jammy
          path: dist/eve-xui-manager-offline.tar.gz
          retention-days: 90

      - name: Upload Redis add-on artifact (all runs)
        uses: actions/upload-artifact@v4
        with:
          name: redis-offline-jammy
          path: dist/redis-offline-jammy.tar.gz
          retention-days: 90

      - name: Attach to GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/eve-xui-manager-offline.tar.gz
            dist/redis-offline-jammy.tar.gz
          body: |
            ## Eve X-UI Manager ${{ steps.info.outputs.version }}

            ### Changes in this release
            ${{ steps.info.outputs.changelog }}

            ---

            ## Offline Bundle — Ubuntu 22.04 (Jammy) amd64

            Contains **everything** needed to install Eve on a server with **no internet access**:

            | Included | Description |
            |----------|-------------|
            | 📦 System packages | All `.deb` files for Ubuntu 22.04 Jammy amd64 (incl. **Redis**) |
            | 🐍 Python 3.11 runtime | Portable, no system Python needed |
            | 📚 Python packages | Pre-built wheels (CPython 3.11 / x86_64, incl. **redis**) |
            | 📂 Application | Full source code |

            Bundle size: **${{ steps.info.outputs.size }}**

            ### Downloads

            | File | Use for |
            |------|---------|
            | `eve-xui-manager-offline.tar.gz` | **Full** offline install/update (includes Redis) |
            | `redis-offline-jammy.tar.gz` | **Add Redis only** to an existing offline install (no full rebuild) |

            ---

            ### Fresh Install (no internet needed)

            ```bash
            # 1. Upload to server via SCP
            scp eve-xui-manager-offline.tar.gz root@YOUR_SERVER:/root/

            # 2. On the server:
            tar -xzf /root/eve-xui-manager-offline.tar.gz -C /root/
            cd /root/eve-xui-manager
            sudo bash setup.sh
            # → Choose:  [o] Setup Full Offline
            ```

            ### Add Redis to an existing offline install

            ```bash
            scp redis-offline-jammy.tar.gz root@YOUR_SERVER:/root/
            # On the server:
            mkdir -p /root/redis-addon
            tar -xzf /root/redis-offline-jammy.tar.gz -C /root/redis-addon
            cd /root/redis-addon
            sudo bash install-redis-offline.sh
            # Installs Redis offline, sets REDIS_URL in .env, restarts the app.
            ```

            ### Update Existing Install

            ```bash
            cd /opt/eve-xui-manager
            git pull
            sudo systemctl restart eve-manager
            ```

            ### After Install

            ```bash
            sudo eve          # management menu
            sudo journalctl -u eve-manager -f   # live logs
            ```
